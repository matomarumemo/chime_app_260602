<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chime Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <svg class="header-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span class="header-logo">FocusTimer</span>
                </div>
                <div class="header-right">
                    <button id="settings-btn" class="header-nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Setting</span>
                    </button>
                    <button id="signin-btn" class="header-nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Sign In</span>
                    </button>
                    <button id="menu-btn" class="header-nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="12" cy="5" r="1"></circle>
                            <circle cx="12" cy="19" r="1"></circle>
                        </svg>
                        <span>Menu</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 上部：セッション情報表示 -->
        <div class="session-info">
            <div class="period-display">
                <span id="period-label">1st Period</span>
            </div>
            <div class="state-display">
                <span id="state-label">READY</span>
            </div>
            <div id="current-task-display" class="current-task-display"></div>
        </div>

        <!-- 中央：残り時間表示 -->
        <div class="timer-display">
            <span id="timer">00:00</span>
        </div>

        <!-- 下部：操作ボタン -->
        <div class="controls">
            <button id="start-btn" class="btn btn-primary">START</button>
            <button id="reset-btn" class="btn btn-secondary">RESET</button>
        </div>

        <!-- 音量確認ボタン -->
        <div class="volume-check">
            <button id="volume-btn" class="btn-volume">🔊 音量確認</button>
        </div>

        <!-- タスク管理エリア -->
        <div class="task-container">
            <div class="task-header">
                <h3>Tasks</h3>
                <div class="task-header-buttons">
                    <button id="delete-selected-btn" class="delete-selected-btn" style="display: none;">Delete Selected</button>
                    <button id="add-task-btn" class="add-task-btn">+ Add Task</button>
                </div>
            </div>
            <div id="task-list" class="task-list">
                <!-- タスクがここに動的に追加されます -->
            </div>
        </div>

        <!-- フッター -->
        <footer class="footer">
            <p>Sound by <a href="https://otologic.jp/" target="_blank" rel="noopener" class="footer-link">OtoLogic</a></p>
        </footer>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>SETTING</h2>
                <button id="close-modal-btn" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <!-- タイマー設定 -->
                <div class="settings-section">
                    <h3>Timer Settings</h3>
                    <div class="timer-settings">
                        <div class="input-group">
                            <label for="pomodoro-time">Pomodoro (minutes)</label>
                            <input type="number" id="pomodoro-time" value="45" min="1" max="120">
                        </div>
                        <div class="input-group">
                            <label for="short-break-time">Short Break (minutes)</label>
                            <input type="number" id="short-break-time" value="10" min="1" max="60">
                        </div>
                    </div>
                </div>

                <!-- 自動開始設定 -->
                <div class="settings-section">
                    <h3>Auto Start</h3>
                    <div class="toggle-settings">
                        <div class="toggle-item">
                            <label for="auto-start-breaks">Auto Start Breaks</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="auto-start-breaks">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-item">
                            <label for="auto-start-pomodoros">Auto Start Pomodoros</label>
                            <label class="toggle-switch">
                                <input type="checkbox" id="auto-start-pomodoros">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- タスク追加/編集モーダル -->
    <div id="task-modal" class="modal">
        <div class="modal-content task-modal-content">
            <div class="modal-header">
                <h2 id="task-modal-title">Add Task</h2>
                <button id="close-task-modal-btn" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="task-name">Task Name</label>
                    <input type="text" id="task-name" placeholder="Enter task name">
                </div>
                <div class="input-group">
                    <label for="task-sessions">Target Sessions</label>
                    <input type="number" id="task-sessions" value="1" min="1" max="20">
                </div>
            </div>
            <div class="modal-footer">
                <button id="delete-task-btn" class="btn btn-secondary" style="display: none;">Delete</button>
                <button id="save-task-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
