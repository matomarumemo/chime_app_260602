<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chime Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <svg class="header-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span class="header-logo">FocusTimer</span>
                </div>
                <div class="header-right">
                    <button id="settings-btn" class="header-nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Setting</span>
                    </button>
                    <button id="signin-btn" class="header-nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>Sign In</span>
                    </button>
                    <button id="menu-btn" class="header-nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="12" cy="5" r="1"></circle>
                            <circle cx="12" cy="19" r="1"></circle>
                        </svg>
                        <span>Menu</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 上部：セッション情報表示 -->
        <div class="session-info">
            <div class="period-display">
                <span id="period-label">1st Period</span>
            </div>
            <div class="state-display">
                <span id="state-label">READY</span>
            </div>
        </div>

        <!-- 中央：残り時間表示 -->
        <div class="timer-display">
            <span id="timer">00:00</span>
        </div>

        <!-- 下部：操作ボタン -->
        <div class="controls">
            <button id="start-btn" class="btn btn-primary">START</button>
            <button id="reset-btn" class="btn btn-secondary">RESET</button>
        </div>

        <!-- 音量確認ボタン -->
        <div class="volume-check">
            <button id="volume-btn" class="btn-volume">🔊 音量確認</button>
        </div>

        <!-- 将来的な広告追加用スペース -->
        <div id="ad-space"></div>

        <!-- フッター -->
        <footer class="footer">
            <p>Sound by <a href="https://otologic.jp/" target="_blank" rel="noopener" class="footer-link">OtoLogic</a></p>
        </footer>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>設定</h2>
                <button id="close-modal-btn" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <!-- プリセット選択 -->
                <div class="settings-section">
                    <h3>プリセット</h3>
                    <div class="preset-options">
                        <label class="preset-option">
                            <input type="radio" name="preset" value="A" checked>
                            <span class="preset-label">A: 45分 / 10分</span>
                        </label>
                        <label class="preset-option">
                            <input type="radio" name="preset" value="B">
                            <span class="preset-label">B: 90分 / 15分</span>
                        </label>
                        <label class="preset-option">
                            <input type="radio" name="preset" value="C">
                            <span class="preset-label">C: 20分 / 5分</span>
                        </label>
                    </div>
                </div>

                <!-- カスタム設定（プレミアム機能） -->
                <div class="settings-section premium-section">
                    <div class="premium-overlay">
                        <span class="premium-badge">Premium</span>
                    </div>
                    <h3>カスタム設定</h3>
                    <div class="custom-settings">
                        <div class="input-group">
                            <label for="focus-time">FOCUS時間（分）</label>
                            <input type="number" id="focus-time" value="45" disabled>
                        </div>
                        <div class="input-group">
                            <label for="break-time">BREAK時間（分）</label>
                            <input type="number" id="break-time" value="10" disabled>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings-btn" class="btn btn-primary">保存して閉じる</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
