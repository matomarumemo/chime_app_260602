<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chime Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 設定ボタン -->
        <button id="settings-btn" class="settings-btn">⚙️</button>

        <!-- 上部：セッション情報表示 -->
        <div class="session-info">
            <div class="period-display">
                <span id="period-label">1st Period</span>
            </div>
            <div class="state-display">
                <span id="state-label">READY</span>
            </div>
        </div>

        <!-- 中央：残り時間表示 -->
        <div class="timer-display">
            <span id="timer">00:00</span>
        </div>

        <!-- 下部：操作ボタン -->
        <div class="controls">
            <button id="start-btn" class="btn btn-primary">START</button>
            <button id="reset-btn" class="btn btn-secondary">RESET</button>
        </div>

        <!-- 音量確認ボタン -->
        <div class="volume-check">
            <button id="volume-btn" class="btn-volume">🔊 音量確認</button>
        </div>

        <!-- 将来的な広告追加用スペース -->
        <div id="ad-space">
            <script async src="https://adm.shinobi.jp/st/auto.js" data-admax-id="27e1bf2c4d7e91d58e43b6ce7b4d9d41"></script>
        </div>

        <!-- フッター -->
        <footer class="footer">
            <p>Sound by <a href="https://otologic.jp/" target="_blank" rel="noopener" class="footer-link">OtoLogic</a></p>
        </footer>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>設定</h2>
                <button id="close-modal-btn" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <!-- プリセット選択 -->
                <div class="settings-section">
                    <h3>プリセット</h3>
                    <div class="preset-options">
                        <label class="preset-option">
                            <input type="radio" name="preset" value="A" checked>
                            <span class="preset-label">A: 45分 / 10分</span>
                        </label>
                        <label class="preset-option">
                            <input type="radio" name="preset" value="B">
                            <span class="preset-label">B: 90分 / 15分</span>
                        </label>
                        <label class="preset-option">
                            <input type="radio" name="preset" value="C">
                            <span class="preset-label">C: 20分 / 5分</span>
                        </label>
                    </div>
                </div>

                <!-- カスタム設定（プレミアム機能） -->
                <div class="settings-section premium-section">
                    <div class="premium-overlay">
                        <span class="premium-badge">Premium</span>
                    </div>
                    <h3>カスタム設定</h3>
                    <div class="custom-settings">
                        <div class="input-group">
                            <label for="focus-time">FOCUS時間（分）</label>
                            <input type="number" id="focus-time" value="45" disabled>
                        </div>
                        <div class="input-group">
                            <label for="break-time">BREAK時間（分）</label>
                            <input type="number" id="break-time" value="10" disabled>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings-btn" class="btn btn-primary">保存して閉じる</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
